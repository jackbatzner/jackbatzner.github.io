<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#6e40c9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8957e5;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="#8957e5" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="1000" cy="480" rx="280" ry="180" fill="#6e40c9" opacity="0.1" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#30363d" stroke-width="1" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Shield icon (guardrails) - right side -->
  <g transform="translate(860, 155)">
    <!-- Shield shape -->
    <path d="M140,0 L280,60 L280,180 Q280,300 140,360 Q0,300 0,180 L0,60 Z"
          fill="url(#purple)" opacity="0.15" stroke="#8957e5" stroke-width="2"/>
    <!-- Checkmark inside shield -->
    <polyline points="80,185 125,230 200,145"
              fill="none" stroke="#8957e5" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Code lines - left decorative block -->
  <g font-family="'Courier New', monospace" font-size="18" fill="#58a6ff" opacity="0.5">
    <text x="72" y="200">if agent.scope.includes("pr_review"):</text>
    <text x="72" y="228" fill="#8957e5">    raise GuardrailViolation</text>
    <text x="72" y="256" fill="#3fb950">    # blocked by front matter</text>
    <text x="72" y="284">    log_attempt(agent, action)</text>
  </g>

  <!-- Divider line -->
  <rect x="72" y="340" width="80" height="4" rx="2" fill="url(#purple)"/>

  <!-- Main headline -->
  <text x="72" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="#f0f6fc" letter-spacing="-1">
    My Agent Reviewed My
  </text>
  <text x="72" y="472" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="#f0f6fc" letter-spacing="-1">
    Teammate's Code.
  </text>
  <text x="72" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="#8957e5" letter-spacing="-1">
    I Had No Idea.
  </text>

  <!-- Author tag -->
  <rect x="72" y="562" width="260" height="36" rx="18" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="92" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" fill="#8957e5" font-weight="500">
    Jack Batzner · GitHub Copilot Agents
  </text>

  <!-- GitHub Copilot logo mark (simplified octopus/copilot icon) -->
  <g transform="translate(1090, 30)">
    <circle cx="40" cy="40" r="38" fill="#8957e5" opacity="0.2" stroke="#8957e5" stroke-width="1.5"/>
    <!-- Simplified Copilot face -->
    <circle cx="40" cy="36" r="18" fill="none" stroke="#8957e5" stroke-width="2.5"/>
    <circle cx="33" cy="33" r="3.5" fill="#8957e5"/>
    <circle cx="47" cy="33" r="3.5" fill="#8957e5"/>
    <path d="M33,42 Q40,48 47,42" fill="none" stroke="#8957e5" stroke-width="2" stroke-linecap="round"/>
    <!-- Tentacles -->
    <line x1="22" y1="40" x2="10" y2="52" stroke="#8957e5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="58" y1="40" x2="70" y2="52" stroke="#8957e5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="28" y1="52" x2="22" y2="66" stroke="#8957e5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="40" y1="54" x2="40" y2="70" stroke="#8957e5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="52" y1="52" x2="58" y2="66" stroke="#8957e5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
